<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedHouse Engine</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #09090b;
            --text-color: #f4f4f5;
            --container-bg: #18181b;
            --border-color: #27272a;
            --primary-color: #3b82f6;
            --kitchen-color: #10b981;
            --boiler-color: #0284c7;
            --warn-color: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: var(--container-bg);
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            box-sizing: border-box;
            border: 1px solid var(--border-color);
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .app-header span {
            background: linear-gradient(90deg, #ec4899 0%, #8b5cf6 50%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-gear {
            width: 28px;
            height: 28px;
            animation: spin 15s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .main-tabs {
            display: flex;
            background: #27272a;
            border-radius: 10px;
            padding: 3px;
            margin-bottom: 20px;
        }

        .main-tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            font-weight: 600;
            font-size: 13px;
            color: #a1a1aa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .main-tab-btn.active {
            background: #3f3f46;
            color: #ffffff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .input-group {
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            color: #a1a1aa;
        }

        .input-group input {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            background: #09090b;
            color: #ffffff;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        .sub-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .sub-tab-btn {
            flex: 1;
            padding: 10px;
            background: #27272a;
            border: 1px solid var(--border-color);
            color: #a1a1aa;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sub-tab-btn.active-kitchen {
            background: var(--kitchen-color);
            color: #fff;
            border-color: var(--kitchen-color);
        }

        .sub-tab-btn.active-boiler {
            background: var(--boiler-color);
            color: #fff;
            border-color: var(--boiler-color);
        }

        .btn-send {
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-send:active {
            opacity: 0.8;
        }

        .filter-btn {
            width: 100%;
            padding: 14px;
            margin-bottom: 10px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: opacity 0.2s;
        }

        .filter-btn:active {
            opacity: 0.8;
        }

        .btn-kitchen { background: var(--kitchen-color); }
        .btn-boiler { background: var(--boiler-color); }
        .btn-warn { background: var(--warn-color); }

        .warn-box {
            background: #271c0a;
            border-left: 5px solid var(--warn-color);
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-size: 13px;
            line-height: 1.4;
            color: #fde047;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <span>RH</span>
        <svg viewBox="0 0 24 24" class="logo-gear">
            <defs>
                <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#ec4899" />
                    <stop offset="50%" stop-color="#8b5cf6" />
                    <stop offset="100%" stop-color="#3b82f6" />
                </linearGradient>
            </defs>
            <path fill="url(#logo-gradient)" d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49-.12-.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
        </svg>
        <span>Engine</span>
    </div>

    <div class="main-tabs">
        <button class="main-tab-btn active" onclick="switchMainTab('tab-resources')">📊 Показания</button>
        <button class="main-tab-btn" onclick="switchMainTab('tab-salt')">🧂 Соль</button>
        <button class="main-tab-btn" onclick="switchMainTab('tab-filters')">🔧 Фильтры</button>
    </div>

    <div id="tab-resources" class="tab-content active">
        <div class="input-group">
            <label>Электроэнергия (День):</label>
            <input type="number" step="0.1" id="elec-day" placeholder="Пример: 2288.6">
        </div>
        <div class="input-group">
            <label>Электроэнергия (Ночь):</label>
            <input type="number" step="0.1" id="elec-night" placeholder="Пример: 1107.4">
        </div>
        <div class="input-group">
            <label>Газ:</label>
            <input type="number" id="gas" placeholder="Пример: 31736">
        </div>
        <button class="btn-send" onclick="sendResources()">Отправить показания</button>
    </div>

    <div id="tab-salt" class="tab-content">
        <div class="input-group">
            <label>Дата добавления соли в бак:</label>
            <input type="date" id="salt-date">
        </div>
        <div class="input-group">
            <label>Остаток соли в баке (мешков по 25 кг):</label>
            <input type="number" id="salt-count" value="1" min="0">
        </div>
        <button class="btn-send" style="background:#a855f7;" onclick="sendSalt()">Отправить информацию</button>
    </div>

    <div id="tab-filters" class="tab-content">
        <div class="input-group" style="background: #18181b; padding: 10px; border-radius: 8px; border: 1px dashed #3f3f46;">
            <label for="maintenance-date" style="text-align: center; display: block; margin-bottom: 5px;">📅 Дата проведения ТО:</label>
            <input type="date" id="maintenance-date" style="text-align: center;">
        </div>
        <br>
        <div class="sub-tabs">
            <button id="sub-btn-kitchen" class="sub-tab-btn active-kitchen" onclick="switchSubTab('kitchen')">🍳 Кухня</button>
            <button id="sub-btn-boiler" class="sub-tab-btn" onclick="switchSubTab('boiler')">🎛️ Котельная</button>
        </div>

        <div id="sub-kitchen" class="sub-content">
            <button class="filter-btn btn-kitchen" onclick="sendMaintenance('Кухня', 'Комплект картриджей: K5, K2, K7M', 'Замена')">
                <span>Замена комплекта K5, K2, K7M</span> ➔
            </button>
            <button class="filter-btn btn-kitchen" onclick="sendMaintenance('Кухня', 'Мембранный модуль: K-50S', 'Замена')">
                <span>Замена мембраны K-50S</span> ➔
            </button>
        </div>

        <div id="sub-boiler" class="sub-content" style="display:none;">
            <button class="filter-btn btn-boiler" onclick="sendMaintenance('Котельная', 'Входной фильтр (20BB, 5 мкм, намоточный)', 'Замена')">
                <span>Замена Входного фильтра (20BB)</span> ➔
            </button>
            <button class="filter-btn btn-boiler" onclick="sendMaintenance('Котельная', 'Выходной фильтр (20BB, угольный)', 'Замена')">
                <span>Замена Выходного фильтра (20BB)</span> ➔
            </button>
            
            <div class="warn-box">
                ⚠️ <strong>Внимание!</strong> Во время обслуживания колонны аэрации обязательно проверьте давление в гидроаккумуляторе. Давление включения реле РМ-5 минус десять процентов. <br><em>Пример: Давление включения 3.0 бар - 10% = 2.7 бар.</em>
            </div>
            
            <button class="filter-btn btn-warn" onclick="sendMaintenance('Котельная', 'Колонна аэрации', 'Обслуживание')">
                <span>Обслуживание Колонны аэрации</span> ➔
            </button>
            <button class="filter-btn btn-boiler" onclick="sendMaintenance('Котельная', 'Колонна обезжелезивания', 'Обслуживание')">
                <span>Обслуживание Колонны обезжелезивания</span> ➔
            </button>
            <button class="filter-btn btn-boiler" onclick="sendMaintenance('Котельная', 'Колонна умягчения', 'Обслуживание')">
                <span>Обслуживание Колонны умягчения</span> ➔
            </button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const todayStr = new Date().toISOString().split('T')[0];
    document.getElementById('maintenance-date').value = todayStr;
    document.getElementById('salt-date').value = todayStr;

    function switchMainTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');

        document.querySelectorAll('.main-tab-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function switchSubTab(target) {
        const kBtn = document.getElementById('sub-btn-kitchen');
        const bBtn = document.getElementById('sub-btn-boiler');
        
        if (target === 'kitchen') {
            document.getElementById('sub-kitchen').style.display = 'block';
            document.getElementById('sub-boiler').style.display = 'none';
            kBtn.className = 'sub-tab-btn active-kitchen';
            bBtn.className = 'sub-tab-btn';
        } else {
            document.getElementById('sub-kitchen').style.display = 'none';
            document.getElementById('sub-boiler').style.display = 'block';
            kBtn.className = 'sub-tab-btn';
            bBtn.className = 'sub-tab-btn active-boiler';
        }
    }

    function formatDate(rawDate) {
        const parts = rawDate.split('-');
        return `${parts[2]}.${parts[1]}.${parts[0]}`;
    }

    function sendResources() {
        const elecDay = document.getElementById('elec-day').value;
        const elecNight = document.getElementById('elec-night').value;
        const gas = document.getElementById('gas').value;

        if (!elecDay || !elecNight || !gas) {
            alert("Пожалуйста, заполните все показания!");
            return;
        }

        const payload = `${elecDay} ${elecNight} ${gas}`;
        tg.sendData(payload);
        tg.close();
    }

    function sendSalt() {
        const saltDate = document.getElementById('salt-date').value;
        const count = document.getElementById('salt-count').value; 
        
        if (!saltDate || count === "") return;
        
        // 6 элементов: Триггер ; Помещение ; Объект ; Дата ; Действие ; Сырое число (для триггера)
        const payload = `salt;Котельная;Реагентный бак (остаток: ${count} мешков);${formatDate(saltDate)};Загрузка соли;${count}`;
        tg.sendData(payload);
        tg.close();
    }

    function sendMaintenance(room, object, action) {
        const maintenanceDate = document.getElementById('maintenance-date').value;
        if (!maintenanceDate) {
            alert("Пожалуйста, выберите дату обслуживания!");
            return;
        }

        // 5 элементов: Триггер ; Помещение ; Объект ; Дата ; Действие
        const payload = `service;${room};${object};${formatDate(maintenanceDate)};${action}`;
        tg.sendData(payload);
        tg.close();
    }
</script>
</body>
</html>
