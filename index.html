<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг загородного дома</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #09090b; /* Глубокий черный */
            --text-color: #f4f4f5; /* Светлый текст */
            --container-bg: #18181b; /* Темно-серый контейнер */
            --border-color: #27272a; /* Границы */
            --primary-color: #3b82f6; /* Электрик блю */
            --kitchen-color: #10b981; /* Изумрудный зеленый */
            --boiler-color: #0284c7; /* Синий котельной */
            --warn-color: #f59e0b; /* Янтарный */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: var(--container-bg);
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            box-sizing: border-box;
            border: 1px solid var(--border-color);
        }

        /* Главные вкладки */
        .main-tabs {
            display: flex;
            background: #27272a;
            border-radius: 10px;
            padding: 3px;
            margin-bottom: 20px;
        }

        .main-tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            font-weight: 600;
            font-size: 13px;
            color: #a1a1aa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .main-tab-btn.active {
            background: #3f3f46;
            color: #ffffff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Поля ввода (Показания) */
        .input-group {
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            color: #a1a1aa;
        }

        .input-group input {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            background: #09090b;
            color: #ffffff;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        /* Саб-табы для фильтров (Кухня / Котельная) */
        .sub-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .sub-tab-btn {
            flex: 1;
            padding: 10px;
            background: #27272a;
            border: 1px solid var(--border-color);
            color: #a1a1aa;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sub-tab-btn.active-kitchen {
            background: var(--kitchen-color);
            color: #fff;
            border-color: var(--kitchen-color);
        }

        .sub-tab-btn.active-boiler {
            background: var(--boiler-color);
            color: #fff;
            border-color: var(--boiler-color);
        }

        /* Кнопки действий */
        .btn-send {
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-send:active {
            opacity: 0.8;
        }

        .filter-btn {
            width: 100%;
            padding: 14px;
            margin-bottom: 10px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: opacity 0.2s;
        }

        .filter-btn:active {
            opacity: 0.8;
        }

        .btn-kitchen { background: var(--kitchen-color); }
        .btn-boiler { background: var(--boiler-color); }
        .btn-warn { background: var(--warn-color); }

        /* Предупреждение */
        .warn-box {
            background: #271c0a;
            border-left: 5px solid var(--warn-color);
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-size: 13px;
            line-height: 1.4;
            color: #fde047;
        }

        /* Календарь для темной темы */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1); /* Делает иконку календаря белой */
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Навигация верхнего уровня -->
    <div class="main-tabs">
        <button class="main-tab-btn active" onclick="switchMainTab('tab-resources')">📊 Показания</button>
        <button class="main-tab-btn" onclick="switchMainTab('tab-salt')">🧂 Соль</button>
        <button class="main-tab-btn" onclick="switchMainTab('tab-filters')">🔧 Фильтры</button>
    </div>

    <!-- 1. ВКЛАДКА: ПОКАЗАНИЯ -->
    <div id="tab-resources" class="tab-content active">
        <div class="input-group">
            <label>Эл. День (Показания):</label>
            <input type="number" step="0.1" id="elec-day" placeholder="например, 2288.6">
        </div>
        <div class="input-group">
            <label>Эл. Ночь (Показания):</label>
            <input type="number" step="0.1" id="elec-night" placeholder="например, 1107.4">
        </div>
        <div class="input-group">
            <label>Газ (Показания):</label>
            <input type="number" id="gas" placeholder="например, 31736">
        </div>
        <button class="btn-send" onclick="sendResources()">Отправить показания</button>
    </div>

    <!-- 2. ВКЛАДКА: СОЛЬ -->
    <div id="tab-salt" class="tab-content">
        <div class="input-group">
            <label>Дата добавления соли:</label>
            <input type="date" id="salt-date">
        </div>
        <div class="input-group">
            <label>Количество мешков (по 25 кг):</label>
            <input type="number" id="salt-count" value="1" min="1">
        </div>
        <button class="btn-send" style="background:#a855f7;" onclick="sendSalt()">Зафиксировать соль</button>
    </div>

    <!-- 3. ВКЛАДКА: ФИЛЬТРЫ -->
    <div id="tab-filters" class="tab-content">
        <!-- Выбор даты обслуживания (Календарь для заднего числа) -->
        <div class="input-group" style="background: #18181b; padding: 10px; border-radius: 8px; border: 1px dashed #3f3f46;">
            <label for="maintenance-date" style="text-align: center; display: block; margin-bottom: 5px;">📅 Дата проведения ТО:</label>
            <input type="date" id="maintenance-date" style="text-align: center;">
        </div>

        <br>

        <!-- Под-вкладки (Кухня / Котельная) -->
        <div class="sub-tabs">
            <button id="sub-btn-kitchen" class="sub-tab-btn active-kitchen" onclick="switchSubTab('kitchen')">🍳 Кухня</button>
            <button id="sub-btn-boiler" class="sub-tab-btn" onclick="switchSubTab('boiler')">🎛️ Котельная</button>
        </div>

        <!-- Раздел КУХНЯ -->
        <div id="sub-kitchen" class="sub-content">
            <button class="filter-btn btn-kitchen" onclick="sendMaintenance('Кухня', 'Комплект картриджей: K5, K2, K7M')">
                <span>Замена комплекта K5, K2, K7M</span> ➔
            </button>
            <button class="filter-btn btn-kitchen" onclick="sendMaintenance('Кухня', 'Мембранный модуль: K-50S')">
                <span>Замена мембраны K-50S</span> ➔
            </button>
        </div>

        <!-- Раздел КОТЕЛЬНАЯ -->
        <div id="sub-boiler" class="sub-content" style="display:none;">
            <button class="filter-btn btn-boiler" onclick="sendMaintenance('Котельная', 'Входной фильтр (20BB, 5 мкм, намоточный)')">
                <span>Замена Входного фильтра (20BB)</span> ➔
            </button>
            <button class="filter-btn btn-boiler" onclick="sendMaintenance('Котельная', 'Выходной фильтр (20BB, угольный)')">
                <span>Замена Выходного фильтра (20BB)</span> ➔
            </button>
            
            <div class="warn-box">
                ⚠️ <strong>Внимание!</strong> Во время обслуживания колонны аэрации обязательно проверьте давление в гидроаккумуляторе. Давление включения реле РМ-5 минус десять процентов. <br><em>Пример: Давление включения 3.0 бар - 10% = 2.7 бар.</em>
            </div>
            
            <button class="filter-btn btn-warn" onclick="sendMaintenance('Котельная', 'Колонна аэрации')">
                <span>Обслуживание Колонны аэрации</span> ➔
            </button>
            <button class="filter-btn btn-boiler" onclick="sendMaintenance('Котельная', 'Колонна обезжелезивания')">
                <span>Обслуживание Колонны обезжелезивания</span> ➔
            </button>
            <button class="filter-btn btn-boiler" onclick="sendMaintenance('Котельная', 'Колонна умягчения')">
                <span>Обслуживание Колонны умягчения</span> ➔
            </button>
        </div>
    </div>
</div>

<script>
    // Инициализация Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Автоподстановка сегодняшнего числа во все календари
    const todayStr = new Date().toISOString().split('T')[0];
    document.getElementById('maintenance-date').value = todayStr;
    document.getElementById('salt-date').value = todayStr;

    // Переключение главных вкладок
    function switchMainTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');

        document.querySelectorAll('.main-tab-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    // Переключение под-вкладок фильтров (Кухня / Котельная)
    function switchSubTab(target) {
        const kBtn = document.getElementById('sub-btn-kitchen');
        const bBtn = document.getElementById('sub-btn-boiler');
        
        if (target === 'kitchen') {
            document.getElementById('sub-kitchen').style.display = 'block';
            document.getElementById('sub-boiler').style.display = 'none';
            kBtn.className = 'sub-tab-btn active-kitchen';
            bBtn.className = 'sub-tab-btn';
        } else {
            document.getElementById('sub-kitchen').style.display = 'none';
            document.getElementById('sub-boiler').style.display = 'block';
            kBtn.className = 'sub-tab-btn';
            bBtn.className = 'sub-tab-btn active-boiler';
        }
    }

    // Вспомогательная функция перевода YYYY-MM-DD в DD.MM.YYYY
    function formatDate(rawDate) {
        const parts = rawDate.split('-');
        return `${parts[2]}.${parts[1]}.${parts[0]}`;
    }

    // 1. Отправка ПОКАЗАНИЙ
    function sendResources() {
        const elecDay = document.getElementById('elec-day').value;
        const elecNight = document.getElementById('elec-night').value;
        const gas = document.getElementById('gas').value;

        if (!elecDay || !elecNight || !gas) {
            alert("Пожалуйста, заполните все показания!");
            return;
        }

        const payload = `${elecDay} ${elecNight} ${gas}`;
        tg.sendData(payload);
        tg.close();
    }

    // 2. Отправка СОЛИ
    function sendSalt() {
        const saltDate = document.getElementById('salt-date').value;
        const count = document.getElementById('salt-count').value;
        
        if (!saltDate || !count) return;
        
        const payload = `salt;${count};${formatDate(saltDate)}`;
        tg.sendData(payload);
        tg.close();
    }

    // 3. Отправка ОБСЛУЖИВАНИЯ ФИЛЬТРОВ
    function sendMaintenance(room, object) {
        const maintenanceDate = document.getElementById('maintenance-date').value;
        if (!maintenanceDate) {
            alert("Пожалуйста, выберите дату обслуживания!");
            return;
        }

        const payload = `service;${room};${object};${formatDate(maintenanceDate)}`;
        tg.sendData(payload);
        tg.close();
    }
</script>
</body>
</html>
