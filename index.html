<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedHouse Engine</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #070509;
            --text-color: #f3e8ff;
            --container-bg: #120e1a;
            --border-color: #2e1f47;
            --primary-color: #a855f7;
            --primary-glow: 0 0 14px rgba(168, 85, 247, 0.6);
            --dark-purple: #24143a;
            --light-purple: #c084fc;
            --neon-magenta: #d946ef;
            --neon-red: #ff3333;
            --btn-bg-unified: #2e1065;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: var(--container-bg);
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.7), 0 0 15px rgba(168, 85, 247, 0.1);
            box-sizing: border-box;
            border: 1px solid var(--border-color);
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .logo-rh {
            color: var(--neon-red);
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.6);
        }

        .logo-engine {
            background: linear-gradient(90deg, var(--light-purple) 0%, var(--primary-color) 50%, #6b21a8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-gear {
            width: 28px;
            height: 28px;
            animation: spin 15s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .main-tabs {
            display: flex;
            background: #1a1326;
            border-radius: 10px;
            padding: 3px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .main-tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            font-weight: 600;
            font-size: 13px;
            color: #7c6e91;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
        }

        .main-tab-btn.active {
            background: var(--dark-purple);
            color: #ffffff;
            border-bottom: 2px solid var(--primary-color);
            box-shadow: 0 4px 12px -2px rgba(168, 85, 247, 0.5);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .input-group {
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            color: #9d8cb5;
        }

        .input-group input {
            height: 45px;
            padding: 0 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            background: #0f0b16;
            color: #ffffff;
            transition: all 0.2s;
            box-sizing: border-box;
            width: 100%;
            display: block;
            min-width: 0;
            max-width: 100%;
        }

        /* Жесткое подавление анальных мобильных стилей iOS WebKit для дат */
        .input-group input[type="date"] {
            -webkit-appearance: none;
            appearance: none;
            text-align: left;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: var(--primary-glow);
        }

        .sub-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .sub-tab-btn {
            flex: 1;
            padding: 10px;
            background: #1a1326;
            border: 1px solid var(--border-color);
            border-bottom: 2px solid transparent;
            color: #9d8cb5;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .sub-tab-btn.active-kitchen,
        .sub-tab-btn.active-boiler {
            background: var(--dark-purple);
            color: #fff;
            border-color: var(--border-color);
            border-bottom: 2px solid var(--primary-color);
            box-shadow: 0 4px 12px -2px rgba(168, 85, 247, 0.5);
        }

        .btn-send {
            background: var(--btn-bg-unified);
            border: 1px solid var(--primary-color);
            color: #fff;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
        }

        .btn-send:active, .filter-btn:active {
            box-shadow: var(--primary-glow);
            filter: brightness(1.2);
        }

        .filter-btn {
            background: var(--btn-bg-unified);
            border: 1px solid var(--primary-color);
            width: 100%;
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
        }

        .btn-warn { 
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
        }

        .warn-box {
            background: #201130;
            border-left: 5px solid var(--neon-magenta);
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-size: 13px;
            line-height: 1.4;
            color: #f5d0ff;
            box-shadow: inset 0 0 8px rgba(217, 70, 239, 0.1);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.8) sepia(1) saturate(5) hue-rotate(230deg);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <span class="logo-rh">RH</span>
        <svg viewBox="0 0 24 24" class="logo-gear">
            <defs>
                <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#ff3333" />
                    <stop offset="50%" stop-color="#a855f7" />
                    <stop offset="100%" stop-color="#6b21a8" />
                </linearGradient>
            </defs>
            <path fill="url(#logo-gradient)" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41L9.25 5.35c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.03-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
        <span class="logo-engine">Engine</span>
    </div>

    <div class="main-tabs">
        <button class="main-tab-btn active" onclick="switchMainTab('tab-resources')">⚡ Показания</button>
        <button class="main-tab-btn" onclick="switchMainTab('tab-salt')">🧂 Соль</button>
        <button class="main-tab-btn" onclick="switchMainTab('tab-filters')">💧 Фильтры</button>
    </div>

    <div id="tab-resources" class="tab-content active">
        <div class="input-group">
            <label>Электроэнергия (День):</label>
            <input type="number" step="0.1" id="elec-day" placeholder="Пример: 2288.6">
        </div>
        <div class="input-group">
            <label>Электроэнергия (Ночь):</label>
            <input type="number" step="0.1" id="elec-night" placeholder="Пример: 1107.4">
        </div>
        <div class="input-group">
            <label>Газ:</label>
            <input type="number" id="gas" placeholder="Пример: 31736">
        </div>
        <button class="btn-send" onclick="sendResources()">Отправить показания</button>
    </div>

    <div id="tab-salt" class="tab-content">
        <div class="input-group">
            <label>Дата загрузки соли:</label>
            <input type="date" id="salt-date">
        </div>
        <div class="input-group">
            <label>Остаток мешков таблетированной соли:</label>
            <input type="number" id="salt-count" value="1" min="0">
        </div>
        <button class="btn-send" onclick="sendSalt()">Отправить информацию</button>
    </div>

    <div id="tab-filters" class="tab-content">
        <div class="input-group">
            <label for="maintenance-date"> Дата проведения ТО:</label>
            <input type="date" id="maintenance-date">
        </div>
        
        <div class="sub-tabs">
            <button id="sub-btn-kitchen" class="sub-tab-btn active-kitchen" onclick="switchSubTab('kitchen')"> Кухня</button>
            <button id="sub-btn-boiler" class="sub-tab-btn" onclick="switchSubTab('boiler')"> Котельная</button>
        </div>

        <div id="sub-kitchen" class="sub-content">
            <button class="filter-btn" onclick="sendMaintenance('Кухня', 'Комплект картриджей: K5, K2, K7M', 'Замена')">
                <span>Замена комплекта K5, K2, K7M</span> ➔
            </button>
            <button class="filter-btn" onclick="sendMaintenance('Кухня', 'Мембранный модуль: K-50S', 'Замена')">
                <span>Замена мембраны K-50S</span> ➔
            </button>
        </div>

        <div id="sub-boiler" class="sub-content" style="display:none;">
            <button class="filter-btn" onclick="sendMaintenance('Котельная', 'Входной фильтр (20BB, 5 мкм, намоточный)', 'Замена')">
                <span>Замена Входного фильтра 20BB (намоточный)</span> ➔
            </button>
            <button class="filter-btn" onclick="sendMaintenance('Котельная', 'Выходной фильтр (20BB, угольный)', 'Замена')">
                <span>Замена Выходного фильтра 20BB (угольный)</span> ➔
            </button>
            
            <div class="warn-box">
                ⚠️ <strong>Внимание!</strong> Во время обслуживания колонны аэрации обязательно проверьте давление в гидроаккумуляторе. Расчёт: давление включения реле РМ-5 минус десять процентов. <br><em>Пример: Давление включения 3.0 бар - 10% = 2.7 бар.</em>
            </div>
            
            <button class="filter-btn btn-warn" onclick="sendMaintenance('Котельная', 'Колонна аэрации', 'Обслуживание')">
                <span>Обслуживание Колонны аэрации</span> ➔
            </button>
            <button class="filter-btn" onclick="sendMaintenance('Котельная', 'Колонна обезжелезивания', 'Обслуживание')">
                <span>Обслуживание Колонны обезжелезивания</span> ➔
            </button>
            <button class="filter-btn" onclick="sendMaintenance('Котельная', 'Колонна умягчения', 'Обслуживание')">
                <span>Обслуживание Колонны умягчения</span> ➔
            </button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const todayStr = new Date().toISOString().split('T')[0];
    document.getElementById('maintenance-date').value = todayStr;
    document.getElementById('salt-date').value = todayStr;

    function switchMainTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');

        document.querySelectorAll('.main-tab-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function switchSubTab(target) {
        const kBtn = document.getElementById('sub-btn-kitchen');
        const bBtn = document.getElementById('sub-btn-boiler');
        
        if (target === 'kitchen') {
            document.getElementById('sub-kitchen').style.display = 'block';
            document.getElementById('sub-boiler').style.display = 'none';
            kBtn.className = 'sub-tab-btn active-kitchen';
            bBtn.className = 'sub-tab-btn';
        } else {
            document.getElementById('sub-kitchen').style.display = 'none';
            document.getElementById('sub-boiler').style.display = 'block';
            kBtn.className = 'sub-tab-btn';
            bBtn.className = 'sub-tab-btn active-boiler';
        }
    }

    function formatDate(rawDate) {
        const parts = rawDate.split('-');
        return `${parts[2]}.${parts[1]}.${parts[0]}`;
    }

    function sendResources() {
        const elecDay = document.getElementById('elec-day').value;
        const elecNight = document.getElementById('elec-night').value;
        const gas = document.getElementById('gas').value;

        if (!elecDay || !elecNight || !gas) {
            alert("Пожалуйста, заполните все показания!");
            return;
        }

        const payload = `${elecDay} ${elecNight} ${gas}`;
        tg.sendData(payload);
        tg.close();
    }

    function sendSalt() {
        const saltDate = document.getElementById('salt-date').value;
        const count = document.getElementById('salt-count').value; 
        
        if (!saltDate || count === "") return;
        
        const payload = `salt;Котельная;Реагентный бак (остаток: ${count} мешков);${formatDate(saltDate)};Загрузка соли;${count}`;
        tg.sendData(payload);
        tg.close();
    }

    function sendMaintenance(room, object, action) {
        const maintenanceDate = document.getElementById('maintenance-date').value;
        if (!maintenanceDate) {
            alert("Пожалуйста, выберите дату обслуживания!");
            return;
        }

        const payload = `service;${room};${object};${formatDate(maintenanceDate)};${action}`;
        tg.sendData(payload);
        tg.close();
    }
</script>
</body>
</html>
