<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #efeff4);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            margin: 0;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 600;
            color: var(--tg-theme-hint-color, #8e8e93);
        }
        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid var(--tg-theme-hint-color, #c8c7cc);
            border-radius: 10px;
            font-size: 16px;
            background-color: var(--tg-theme-secondary-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            outline: none;
        }
        input:focus {
            border-color: var(--tg-theme-button-color, #2481cc);
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="form-group">
        <label for="day">ДЕНЬ (Электроэнергия)</label>
        <input type="number" id="day" inputmode="decimal" placeholder="Ведите показания">
    </div>
    <div class="form-group">
        <label for="night">НОЧЬ (Электроэнергия)</label>
        <input type="number" id="night" inputmode="decimal" placeholder="Ведите показания">
    </div>
    <div class="form-group">
        <label for="gas">ГАЗ</label>
        <input type="number" id="gas" inputmode="decimal" placeholder="Ведите показания">
    </div>
    <button onclick="submitData()">Отправить в систему</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Разворачивает шторку на весь экран смартфона

        function submitData() {
            const dayVal = document.getElementById('day').value.trim();
            const nightVal = document.getElementById('night').value.trim();
            const gasVal = document.getElementById('gas').value.trim();

            if (!dayVal || !nightVal || !gasVal) {
                alert('Ошибка: Все три поля должны быть заполнены.');
                return;
            }

            // Формируем чистую строку через пробелы для старого сплита в Make
            const dataString = `${dayVal} ${nightVal} ${gasVal}`;
            
            tg.sendData(dataString); // Отправляет данные боту и закрывает мини-апп
        }
    </script>
</body>
</html>
